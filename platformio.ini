; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:sensebox_mcu_esp32s2]
platform = espressif32
board = sensebox_mcu_esp32s2
framework = arduino
lib_deps =
    adafruit/Adafruit SSD1306@^2.5.10
    adafruit/Adafruit NeoPixel@^1.12.2
    adafruit/Adafruit HDC1000 Library@^2.0.2
    boschsensortec/BME68x Sensor library@^1.3.40408
    boschsensortec/bsec2@^1.10.2610
	sensebox/SenseBoxBLE@^1.1.0
	JC_Button
	adafruit/Adafruit MPU6050@^2.2.4
	adafruit/Adafruit ICM20X@^2.0.7
	https://github.com/tdk-invn-oss/motion.arduino.ICM42670P.git
build_flags =
	-D SENSEBOX_OS_VERSION='"1.0.0"'
